name: Docker Release

on:
  workflow_dispatch:
    inputs:
      platforms:
        type: choice
        description: 'Build Platforms'
        required: true
        default: 'linux/amd64'
        options:
          - 'linux/amd64'
          - 'linux/amd64,linux/arm64'
      docker_tags:
        type: string
        description: 'Docker Tags'
        required: true
        default: 'dev'

  push:
    branches:
      - master
    tags:
      - 'v*'
  release:
    types:
      - published

jobs:
  build_and_push_docker:
    runs-on: ubuntu-latest
    env:
      dev_arch: 'linux/amd64'
      release_arch: 'linux/amd64,linux/arm64'
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          # Fork publishes only to this repo's GitHub Container Registry namespace
          # (ghcr.io/o51r15/pinchflat). The upstream docker.io/keglin/pinchflat image
          # and its Docker Hub login step were removed — this fork has no access to
          # that namespace and no DOCKERHUB_* secrets are configured.
          images: |
            ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=tag
            type=raw,value=dev,enable=${{ github.event_name != 'release' && github.ref_type != 'tag' && github.event_name != 'workflow_dispatch' }}
            type=raw,value=${{ inputs.docker_tags }},enable=${{ github.event_name == 'workflow_dispatch' }}
          flavor: |
            latest=auto

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./docker/selfhosted.Dockerfile
          platforms: ${{ (github.event_name == 'release' || github.ref_type == 'tag') && env.release_arch || (github.event.inputs.platforms || env.dev_arch) }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
